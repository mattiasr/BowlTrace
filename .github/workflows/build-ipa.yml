name: Build unsigned IPA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show selected Xcode
        run: xcodebuild -version

      - name: Cache BowlBallDetector.mlpackage
        id: cache-model
        uses: actions/cache@v4
        with:
          path: BowlTrace/BowlTrace/Resources/BowlBallDetector.mlpackage
          key: bowlballdetector-mlpackage-${{ hashFiles('Scripts/download-model.py') }}

      - name: Set up Python
        if: steps.cache-model.outputs.cache-hit != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install YOLO-World export dependencies
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: pip install -U "ultralytics>=8.1" "coremltools>=7.1"

      - name: Export YOLO-World to CoreML
        if: steps.cache-model.outputs.cache-hit != 'true'
        run: python3 Scripts/download-model.py

      - name: Build unsigned .app for iphoneos
        working-directory: BowlTrace
        run: |
          xcodebuild \
            -project BowlTrace.xcodeproj \
            -target BowlTrace \
            -configuration Release \
            -sdk iphoneos \
            CONFIGURATION_BUILD_DIR="$PWD/build" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Package .app into IPA
        working-directory: BowlTrace
        run: |
          mkdir -p Payload
          cp -R build/BowlTrace.app Payload/
          zip -qry BowlTrace.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BowlTrace-unsigned-ipa
          path: BowlTrace/BowlTrace.ipa
          if-no-files-found: error
